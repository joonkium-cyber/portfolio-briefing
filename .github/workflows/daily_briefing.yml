name: 포트폴리오 일일 브리핑

on:
  schedule:
    - cron: '0 23 * * *'
  workflow_dispatch:

jobs:
  send-briefing:
    runs-on: ubuntu-latest

    steps:
      - name: 저장소 체크아웃
        uses: actions/checkout@v4

      - name: Python 설정
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 의존성 설치
        run: pip install -r requirements.txt

      - name: 설정 파일 생성
        run: echo '${{ secrets.BRIEFING_CONFIG }}' > briefing_config.json

      - name: 브리핑 이메일 발송
        run: python daily_briefing.py
